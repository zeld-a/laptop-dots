                                    ###########################
                                    ### INPUT CONFIGURATION ###
                                    ###########################
#/||--------------------------------------------------------------------------------------------||\#

# For more info on input rules, visit: https://wiki.hyprland.org

#/||--------------------------------------------------------------------------------------------||\#

# Input settings for general system usage
input {
    kb_layout = us                          # Set keyboard layout to US (default)
    kb_variant =                             # Optional: specify keyboard variant (usually left blank)
    kb_model =                               # Optional: specify keyboard model (usually left blank)
    kb_options = altwin:swap_lalt_lwin       # Optional: specify keyboard options (usually left blank)
    kb_rules =                               # Optional: specify keyboard rules (usually left blank)

    follow_mouse = 1                         # Enable or disable mouse-following feature
    sensitivity = 0                          # Set mouse sensitivity (range: -1.0 to 1.0, 0 means no modification)

    touchpad {
        natural_scroll = true               # Set touchpad natural scrolling behavior (false = no natural scrolling)
    }
}

# Example of per-device input configuration for specific devices
# This allows per-device sensitivity adjustments for individual input devices
device {
    name = epic-mouse-v1                     # Specify the device name (e.g., 'epic-mouse-v1')
    sensitivity = -0.5                       # Adjust sensitivity specifically for the 'epic-mouse-v1' device
}

#/||--------------------------------------------------------------------------------------------||\#