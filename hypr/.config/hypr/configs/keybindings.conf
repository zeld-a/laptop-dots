                                    ##############################
                                    ### KEYBINDS CONFIGURATION ###
                                    ##############################
#/||--------------------------------------------------------------------------------------------||\#

# For more info, visit https://wiki.hyprland.org

#/||--------------------------------------------------------------------------------------------||\#

### Sources ###

# Define additional configurations sources to load specific variables and paths
source = $HOME/.config/hypr/configs/variables.conf

### Utilities ###

# Screenshot bindings for selecting screen, window, or region
bind = $mainMod, PRINT, exec, hyprshot -z -m region
bind = $mainMod SHIFT, PRINT, exec, hyprshot  -m output
bind = SHIFT, PRINT, exec, hyprshot -m window

# Binding to relaunch waybar
bind = $mainMod, R, exec, ~/.config/waybar/scripts/launch.sh

### App Launchers ###

# Launch Default Applications
bind = $mainMod, RETURN, exec, $terminal
bind = $mainMod, E, exec, $fileManager
bind = $mainMod, SPACE, exec, $menu
bind = $mainMod SHIFT, H, exec, $editor
bind = $mainMod, B, exec, $browser
bind = $mainMod SHIFT, L, exec, hyprlock
bind = $mainMod, M, exec, $musicPlayer

### Functions ###

# Bind various functions such as killing active windows, toggling fullscreen, and toggling window float behavior
bind = $mainMod, ESCAPE, killactive,
bind = $mainMod, V, togglefloating,
bind = $mainMod, P, pin
bind = $mainMod, A, layoutmsg, swapwithmaster master

bind = $mainMod SHIFT, F1, layoutmsg, orientationcenter
bind = $mainMod SHIFT, F2, layoutmsg, orientationleft
bind = $mainMod SHIFT, F3, layoutmsg, orientationright
bind = $mainMod SHIFT, F4, layoutmsg, orientationtop
bind = $mainMod SHIFT, F5, layoutmsg, orientationbottom

### KeyPass ###

# Binds to pass to a program.

### Focus ###

# Move focus between windows using  vim motions
bind = $mainMod, H, movefocus, l
bind = $mainMod, J, movefocus, d
bind = $mainMod, K, movefocus, u
bind = $mainMod, L, movefocus, r

### Navigation ###

# Move windows using SHIFT + vim motions
bind = $mainMod, H, movefocus, l
bind = $mainMod, J, movefocus, d
bind = $mainMod, K, movefocus, u
bind = $mainMod, L, movefocus, r

### Workspace Switching ###

# Switch between workspaces using $mainMod + [0-9].
bind = $mainMod , 1, workspace, 1
bind = $mainMod , 2, workspace, 2
bind = $mainMod , 3, workspace, 3
bind = $mainMod , 4, workspace, 4
bind = $mainMod , 5, workspace, 5
bind = $mainMod , 6, workspace, 6
bind = $mainMod , 7, workspace, 7
bind = $mainMod , 8, workspace, 8
bind = $mainMod , 9, workspace, 9
bind = $mainMod , 0, workspace, 10

### Window Movement ##

# Move the active window to specified workspace using SHIFT + [0-9]
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

### Special Workspaces ###

# Enable toggling between special workspaces
bind = $mainMod, S, togglespecialworkspace, media
bind = $mainMod SHIFT, S, movetoworkspace, special:media

### Floating Resizing ###

# Move or resize floating windows by holding down $mainMod + LMB/RMB
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

## Laptop ###

# Bind multimedia keys for volume control and brightness adjustment on a laptop
bindel = ,XF86AudioRaiseVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+
bindel = ,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = ,XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindel = ,XF86MonBrightnessUp, exec, brightnessctl s 10%+
bindel = ,XF86MonBrightnessDown, exec, brightnessctl s 10%-

# Lock on lid close
bindl=,switch:off:Lid Switch, exec, hyprlock --immediate

#/||--------------------------------------------------------------------------------------------||\#