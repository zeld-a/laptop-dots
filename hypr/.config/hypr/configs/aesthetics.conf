                                    ################################
                                    ### AESTHETICS CONFIGURATION ###
                                    ################################
#/||--------------------------------------------------------------------------------------------||\#

# For more info, visit: https://wiki.hyprland.org

#/||--------------------------------------------------------------------------------------------||\#

## General Settings ###

general {
    gaps_in = 4
    gaps_out = 9
    border_size = 1

    col.active_border = rgba(faf0e699) rgba(d9b99bcc) 45deg
    col.inactive_border = rgba(1a2e1a99)

    allow_tearing = true
    layout = dwindle

}

### Dwindlw Layout ###

dwindle {
    pseudotile = true
    preserve_split = true
    force_split = 2
}

### Workspaces ###

# Workspace specific appearance settings

workspace = 1, persistent:true
workspace = 2, persistent:true
workspace = 3, persistent:true
workspace = 4, persistent:true
workspace = 5, persistent:true
workspace = special:media, layout:dwindle, gapsout:100 24 24 24, gapsin:18, border:false

### Animations ###

# Animation settings, including duration, style, and specific animation effects. See https://wiki.hyprland.org/Configuring/Variables/#animations
animations {
    enabled = true
    bezier = linear, 0, 0, 1, 1
    bezier = md3_standard, 0.2, 0, 0, 1
    bezier = md3_decel, 0.05, 0.7, 0.1, 1
    bezier = md3_accel, 0.3, 0, 0.8, 0.15
    bezier = overshot, 0.05, 0.9, 0.1, 1.1
    bezier = crazyshot, 0.1, 1.5, 0.76, 0.92 
    bezier = hyprnostretch, 0.05, 0.9, 0.1, 1.0
    bezier = fluent_decel, 0.1, 1, 0, 1
    bezier = easeInOutCirc, 0.85, 0, 0.15, 1
    bezier = easeOutCirc, 0, 0.55, 0.45, 1
    bezier = easeOutExpo, 0.16, 1, 0.3, 1
    animation = windows, 1, 3, md3_decel, popin 60%
    animation = border, 1, 10, default
    animation = fade, 1, 2.5, md3_decel
    animation = workspaces, 1, 3.5, easeOutExpo, slide
    animation = specialWorkspace, 1, 3, md3_decel, slidevert
}

### Decoration Settings ###

# Adjusts visual aspects such as window rounding, transpareny, shadows, and blur.

# See https://wiki.hyprland.org/Configuring/Variables#decoration
decoration {
    rounding = 10
    
    # Transparency levels
    active_opacity = 1.0
    inactive_opacity = 1.0
    
    # Shadow settings
    shadow {
        enabled = true
        range = 2
        render_power = 1
        color = rgba(1a1a1aee)
    }
    
    # Blur settings
    blur {
        enabled = true
        size = 6
        passes = 3
        vibrancy = 0.1696
    }
}

#/||--------------------------------------------------------------------------------------------||\#